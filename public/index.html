<!DOCTYPE html>
<html lang="zh-TW" class="dark">

<head>
  <meta charset="UTF-8">
  <title>AI 戰情室 Pro v8.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-100 p-8 font-sans">
  <div class="max-w-7xl mx-auto">
    <header class="mb-10 flex justify-between items-center">
      <div>
        <h1 class="text-4xl font-black text-blue-400">⚡ AI 戰情室 Pro v8.3</h1>
        <p class="text-gray-500 mt-2 text-sm">v8.3 情緒指標 x 原物料連動 x 時序套利</p>
      </div>
      <div class="flex gap-2">
        <button onclick="triggerIntraday()"
          class="bg-green-800 text-xs px-3 py-1 rounded border border-green-600 hover:bg-green-700">更新即時價</button>
        <button onclick="triggerUpdate()"
          class="bg-gray-800 text-xs px-3 py-1 rounded border border-gray-700 hover:bg-gray-700">執行全網更新</button>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="md:col-span-3 bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
        <div class="flex justify-between items-end mb-4">
          <div>
            <label class="block text-xs text-gray-400 mb-1 font-bold uppercase">策略核心</label>
            <div class="text-sm text-gray-300">
              特色：結合<span class="text-yellow-400 font-bold">市場情緒</span>與<span
                class="text-pink-400 font-bold">原物料期貨</span>，實現全域宏觀分析。
            </div>
          </div>
          <button onclick="runScreen()"
            class="bg-blue-600 hover:bg-blue-500 py-2 px-6 rounded-lg font-bold transition shadow-lg active:scale-95">載入
            AI 報告</button>
        </div>
      </div>

      <div class="md:col-span-1 bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-xl overflow-y-auto max-h-40">
        <h3 class="text-xs text-gray-400 font-bold uppercase mb-2">🛡️ 模型勝率驗證</h3>
        <div id="backtestBoard" class="space-y-2 text-xs">
          <div class="text-gray-500 text-center py-2">載入中...</div>
        </div>
      </div>
    </div>

    <!-- ✨ [v8.4] 權證即時熱度監控區 (模仿截圖樣式) -->
    <div class="mb-8">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-orange-400 flex items-center gap-2">
          🔥 權證即時熱度監控 <span class="text-[10px] bg-red-600 text-white px-1 rounded animate-pulse">LIVE</span>
        </h3>
        <button onclick="updateWarrantHot()" class="text-xs text-gray-400 hover:text-white underline">重新整理</button>
      </div>
      <div class="bg-white text-gray-900 rounded-xl overflow-hidden shadow-2xl border border-gray-200">
        <table class="w-full text-left text-sm">
          <thead class="bg-gray-50 text-gray-500 font-bold border-b">
            <tr>
              <th class="p-3">標的</th>
              <th class="p-3 text-center">漲跌</th>
              <th class="p-3 text-center">成交值</th>
              <th class="p-3">熱度</th>
            </tr>
          </thead>
          <tbody id="warrantBody" class="divide-y divide-gray-100 italic-none">
            <!-- 動態插入 -->
          </tbody>
        </table>
      </div>
    </div>

    <div id="resWrap" class="hidden">
      <div class="bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden shadow-2xl overflow-x-auto">
        <table class="w-full text-left whitespace-nowrap">
          <thead class="bg-gray-700/50 text-gray-400 text-[11px] tracking-wider uppercase">
            <tr>
              <th class="p-4 text-white">AI 評分</th>
              <th class="p-4">標的 / 產業</th>
              <th class="p-4">RS 強弱</th>
              <th class="p-4 text-orange-400">風險 (Beta/Vol)</th>
              <th class="p-4 text-green-400">策略觀點</th>
            </tr>
          </thead>
          <tbody id="resBody" class="divide-y divide-gray-700 text-sm"></tbody>
        </table>
      </div>
    </div>
    <div id="loading" class="hidden text-center py-24 text-gray-500 animate-pulse text-xl font-bold font-mono">🚀 運算中...
    </div>
  </div>

  <script>
    fetch('/api/backtest').then(r => r.json()).then(res => {
      if (res.success && res.data.length > 0) {
        document.getElementById('backtestBoard').innerHTML = res.data.map(r => `
          <div class="flex justify-between items-center bg-gray-700/50 p-2 rounded">
            <div>
              <div class="text-gray-300 font-bold">${r.lookbackDays}日驗證</div>
              <div class="text-[10px] text-gray-500">${r.targetDate}</div>
            </div>
            <div class="text-right">
              <div class="${r.avgReturn > 0 ? 'text-red-400' : 'text-green-400'} font-bold">${r.avgReturn}%</div>
              <div class="text-[10px] text-gray-400">勝率 ${r.winRate}%</div>
            </div>
          </div>
        `).join('');
      } else {
        document.getElementById('backtestBoard').innerHTML = '<div class="text-gray-500">暫無驗證資料</div>';
      }
    });

    async function updateWarrantHot() {
      try {
        const res = await fetch('/api/warrants/hot');
        const result = await res.json();
        const tbody = document.getElementById('warrantBody');
        if (result.success && result.data.length > 0) {
          tbody.innerHTML = result.data.map(w => {
            const colorClass = w.changePercent >= 0 ? 'text-red-500' : 'text-green-600';
            const changeSign = w.changePercent >= 0 ? '+' : '';
            return `
              <tr class="hover:bg-gray-50 transition">
                <td class="p-3">
                  <div class="font-bold text-gray-700">${w.name}</div>
                  <div class="text-[10px] text-gray-400">${w.symbol.split('.')[0]}</div>
                </td>
                <td class="p-3 text-center font-bold ${colorClass}">
                  ${changeSign}${w.changePercent.toFixed(2)}%
                </td>
                <td class="p-3 text-center text-gray-600 font-medium">
                  ${Math.round(w.amount)}萬
                </td>
                <td class="p-3 w-32">
                  <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                    <div class="bg-red-500 h-full transition-all duration-1000" style="width: ${w.hotScore}%"></div>
                  </div>
                </td>
              </tr>`;
          }).join('');
        }
      } catch (e) { console.error("更新權證失敗", e); }
    }

    // 初始化與定時更新 (每 60 秒)
    updateWarrantHot();
    setInterval(updateWarrantHot, 60000);

    async function triggerIntraday() { fetch('/api/intraday', { method: 'POST' }); alert("盤中更新已觸發"); }
    async function triggerUpdate() { if (!confirm("確定執行全網更新？")) return; fetch('/api/update', { method: 'POST' }); alert("背景作業已啟動！"); }

    async function runScreen() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('resWrap').classList.add('hidden');
      try {
        const res = await fetch('/api/screen', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ rsiThreshold: 60 }) });
        const result = await res.json();
        const tbody = document.getElementById('resBody');

        if (result.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-500 font-bold">資料更新中...</td></tr>';
        } else {
          const rowsHtml = result.data.map(s => {
            let scoreColor = s.score >= 80 ? 'text-pink-500' : s.score >= 60 ? 'text-red-400' : 'text-gray-400';

            const tagsHtml = s.tags.map(t => {
              let color = 'bg-gray-700 text-gray-300';
              if (t.includes('高負債') || t.includes('情緒過熱')) color = 'bg-red-900 text-red-200 border border-red-700'; // ✨
              if (t.includes('落後') || t.includes('補漲')) color = 'bg-cyan-900 text-cyan-200 border border-cyan-500 animate-pulse';
              if (t.includes('油價') || t.includes('銅價')) color = 'bg-yellow-900 text-yellow-200 border border-yellow-600'; // ✨
              if (t.includes('法人喊買')) color = 'bg-green-900 text-green-200 border border-green-700'; // ✨
              if (t.includes('客戶')) color = 'bg-purple-900 text-purple-200';
              return `<span class="${color} text-[10px] px-1 rounded mr-1">${t}</span>`;
            }).join('');

            let liveTag = s.isLive ? '<span class="bg-green-600 text-white text-[10px] px-1 rounded ml-1">LIVE</span>' : '';
            let betaVal = parseFloat(s.beta);
            let betaClass = betaVal > 1.2 ? 'text-red-400 font-bold' : 'text-gray-400';

            return `
              <tr class="hover:bg-gray-700/50 transition">
                <td class="p-4">
                  <div class="text-3xl font-black ${scoreColor}">${s.score}</div>
                  <div class="mt-1 flex flex-wrap gap-1">${tagsHtml}</div>
                </td>
                <td class="p-4">
                  <span class="font-black text-blue-400 text-lg">${s.symbol}</span> ${liveTag}
                  <div class="text-xs text-gray-500 mt-1">${s.sector}</div>
                </td>
                <td class="p-4 bg-gray-800/30 border-l border-gray-700">
                  <div class="text-sm font-bold ${parseFloat(s.rsValue) > 0 ? 'text-red-400' : 'text-gray-500'}">RS: ${s.rsValue}</div>
                  <div class="text-xs ${s.percent >= 0 ? 'text-red-400' : 'text-green-400'}">${s.percent.toFixed(2)}%</div>
                </td>
                <td class="p-4">
                   <div class="${betaClass} text-sm">β: ${s.beta}</div>
                   <div class="text-xs text-gray-500">Vol: ${s.volatility}%</div>
                </td>
                <td class="p-4">
                   ${s.macroView ? `<div class="text-[10px] text-yellow-500 font-bold">🌍 ${s.macroView}</div>` : ''}
                   <div class="text-xs text-gray-400 mt-1">YoY: <span class="${parseFloat(s.details.revYoY) > 0 ? 'text-red-400' : 'text-green-400'}">${s.details.revYoY}</span></div>
                </td>
              </tr>`;
          }).join('');
          tbody.innerHTML = rowsHtml;
        }
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('resWrap').classList.remove('hidden');
      } catch (e) { alert('連線失敗'); }
    }
  </script>
</body>

</html>
